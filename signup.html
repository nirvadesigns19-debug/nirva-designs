<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Signup | NIRVA DESIGNS</title>

  <!-- CSS -->
  <link rel="stylesheet"
        href="css/auth.css">

  <!-- FONT -->
  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

  <div class="auth-container">

    <div class="auth-card">

      <h1>Create Account</h1>

      <p class="subtitle">
        Join NIRVA DESIGNS
      </p>

      <form id="signupForm">

        <input
          type="text"
          id="signupName"
          placeholder="Full Name"
          required
        >

        <input
          type="email"
          id="signupEmail"
          placeholder="Email Address"
          required
        >

        <input
          type="password"
          id="signupPassword"
          placeholder="Create Password"
          required
        >

        <button type="submit">
          Create Account
        </button>

      </form>

      <p class="bottom-text">

        Already have an account?

        <a href="login.html">
          Login
        </a>

      </p>

    </div>

  </div>

  <!-- JS -->
  <script src="js/signup.js"></script>

</body>
          </html>
