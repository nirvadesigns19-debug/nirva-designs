<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Login | NIRVA DESIGNS</title>

  <link rel="stylesheet"
        href="css/auth.css">

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

  <div class="auth-container">

    <div class="auth-card">

      <h1>NIRVA DESIGNS</h1>

      <p class="subtitle">
        Premium Personalized Gifts
      </p>

      <form id="loginForm">

        <input
          type="email"
          placeholder="Enter Email"
          required
        >

        <input
          type="password"
          placeholder="Enter Password"
          required
        >

        <button type="submit">
          Login
        </button>

      </form>

      <p class="bottom-text">

        Don't have an account?

        <a href="signup.html">
          Create Account
        </a>

      </p>

    </div>

  </div>
  
<script type="module" src="js/login.js"></script>

</body>
          </html>
