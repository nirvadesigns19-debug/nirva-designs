<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Checkout | NIRVA DESIGNS</title>

  <link rel="stylesheet"
        href="css/style.css">

  <link rel="stylesheet"
        href="css/responsive.css">

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>
<body>

  <section class="section">

    <div class="section-title">

      <h2>
        Checkout
      </h2>

      <p>
        Complete your premium order
      </p>

    </div>

    <div class="checkout-layout">

      <!-- ADDRESS -->

      <div class="checkout-form">

        <form id="checkoutForm">

          <input type="text"
                 id="customerName"
                 placeholder="Full Name"
                 required>

          <input type="tel"
                 id="customerPhone"
                 placeholder="Phone Number"
                 required>

          <textarea
            id="customerAddress"
            placeholder="Full Address"
            required></textarea>

          <input type="text"
                 id="customerCity"
                 placeholder="City"
                 required>

          <input type="text"
                 id="customerPincode"
                 placeholder="Pincode"
                 required>

          <button type="submit"
                  class="gold-btn">

            Place Order

          </button>

        </form>

      </div>

      <!-- SUMMARY -->

      <div class="checkout-summary">

        <h3>
          Order Summary
        </h3>

        <div id="checkoutItems">
        </div>

        <div class="summary-total">

          <h2>
            Total:
            ₹<span id="checkoutTotal">0</span>
          </h2>

        </div>

      </div>

    </div>

  </section>

  <script src="js/checkout.js"></script>

</body>
          </html>
